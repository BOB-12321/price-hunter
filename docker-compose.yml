services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pricehunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-pricehunter}
    volumes:
      - pricehunter_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricehunter} -d ${POSTGRES_DB:-pricehunter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: price-hunter:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://pricehunter:change_me_in_prod@db:5432/pricehunter}
      DATA_DIR: /app/data
      APP_HOST: 0.0.0.0
      APP_PORT: 3016
      APP_ENV: ${APP_ENV:-development}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_HOME_CHAT_ID: ${TELEGRAM_HOME_CHAT_ID:-}
      OFF_API_URL: ${OFF_API_URL:-https://world.openfoodfacts.org}
    # Bind on 0.0.0.0 so the Tailscale interface can reach the service.
    # UFW (tailscale0 + port 3016) and the 127.0.0.1 publish in
    # docker-compose.yml are the only access paths — no LAN exposure.
    ports:
      - "3016:3016"
    volumes:
      - pricehunter_data:/app/data

volumes:
  pricehunter_db:
  pricehunter_data:
