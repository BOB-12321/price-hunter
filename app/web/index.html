<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b5fff">
  <title>Price Hunter</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header class="topbar">
    <h1>
      <span class="emoji" aria-hidden="true">🛒</span>
      Price Hunter
    </h1>
    <p class="tagline">Dublin Northside · Best price for your basket</p>
  </header>

  <main id="app">
    <!-- Tab content rendered by app.js -->
    <div class="loading">Loading…</div>
  </main>

  <nav class="tabbar" role="tablist" aria-label="Main">
    <button class="tab is-active" data-tab="home" role="tab" aria-selected="true">
      <span class="tab-icon" aria-hidden="true">🏠</span>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab" data-tab="basket" role="tab" aria-selected="false">
      <span class="tab-icon" aria-hidden="true">🧺</span>
      <span class="tab-label">Basket</span>
    </button>
    <button class="tab" data-tab="stores" role="tab" aria-selected="false">
      <span class="tab-icon" aria-hidden="true">🏬</span>
      <span class="tab-label">Stores</span>
    </button>
    <button class="tab" data-tab="hunt" role="tab" aria-selected="false">
      <span class="tab-icon" aria-hidden="true">🎯</span>
      <span class="tab-label">Hunt</span>
    </button>
  </nav>

  <!-- Modal for add/edit forms -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-head">
        <h2 id="modal-title">Title</h2>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
      <footer class="modal-foot">
        <button class="btn btn-ghost" data-close>Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save</button>
      </footer>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
